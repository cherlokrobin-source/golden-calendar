<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Golden Calendar Engine Validation</title>

<link rel="stylesheet" href="style.css">

</head>


<body>


<header class="hero">

<p class="basmala">
﷽
</p>


<h1>
اختبار محرك الرزمانة الذهبية
</h1>


<h2>
Golden Calendar Engine Validation
</h2>


<button onclick="runValidation()">
🚀 تشغيل اختبار المحرك
</button>


</header>



<section class="dashboard">

<div class="dashboard-grid">


<div class="dashboard-card">

<h3>📍 اليوم 1</h3>

<p id="day1">
بانتظار الاختبار
</p>

</div>



<div class="dashboard-card">

<h3>🔢 اليوم 2</h3>

<p id="day2">
بانتظار الاختبار
</p>

</div>



<div class="dashboard-card">

<h3>⏳ نهاية المجال</h3>

<p id="lastDay">
بانتظار الاختبار
</p>

</div>



<div class="dashboard-card">

<h3>🟢 النتيجة</h3>

<p id="result">
لم يبدأ
</p>

</div>


</div>

</section>



<footer>

<p>
Developed by nemimeche benaissa
</p>

<p>
Golden Calendar Engine
</p>

</footer>




<script>

async function checkDay(id){

const response =
await fetch("/golden/day/"+id);

return await response.json();

}



async function runValidation(){

document.getElementById("result").innerHTML =
"⏳ جاري الاختبار...";


try{


const day1 =
await checkDay(1);


const day2 =
await checkDay(2);


const last =
await checkDay(18262125);



document.getElementById("day1").innerHTML =
day1.weekday +
" - " +
day1.solar.day +
"/" +
day1.solar.monthName +
"/" +
day1.solar.year;



document.getElementById("day2").innerHTML =
day2.weekday;



document.getElementById("lastDay").innerHTML =
last.weekday +
" - " +
last.solar.day +
" " +
last.solar.monthName +
" " +
last.solar.year;



document.getElementById("result").innerHTML =
"✅ Engine Validation Passed";



}

catch(error){


document.getElementById("result").innerHTML =
"❌ Validation Failed";


console.error(error);


}


}


</script>


</body>

</html>
